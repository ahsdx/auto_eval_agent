name: factual
matching_categories: [事实, 时新, 科普, 事实-时新]
rules: "准确性权重最高，必须联网核查每个关键事实断言；核查是裁判职责。"
rubrics:
  - name: 准确性
    description: 事实与逻辑是否正确，有无幻觉或错误。
    weight: 1.5
    scale: 5
    sub_dimensions:
      - name: 事实准确性
        description: 陈述的事实/数据是否准确、有据可查
      - name: 逻辑正确性
        description: 推理是否正确、无逻辑谬误和不当推断
      - name: 信息时效性
        description: 内容是否当前最新有效信息
  - name: 完整性
    description: 是否充分回应题目的所有要点，不遗漏。
    weight: 1.0
    scale: 5
    sub_dimensions:
      - name: 要点覆盖
        description: 覆盖了提问中的核心诉求点和子问题
      - name: 细节丰富度
        description: 是否给出足够的数据、例子、步骤等支撑
  - name: 相关性
    description: 是否切题、不跑题、不冗余。
    weight: 1.0
    scale: 5
    sub_dimensions:
      - name: 文本结果相关性
        description: 答案的文本内容与 query 是否直接相关
      - name: 参考来源相关性
        description: 答案引用的来源与 query 语境吻合
  - name: 有用性
    description: 对提问者是否清晰易懂、切实满足需求
    weight: 1.0
    scale: 5
    sub_dimensions:
      - name: 清晰易懂
        description: 表达清晰、易读、不晦涩
      - name: 需求满足度
        description: 是否真正回应提问者需求
  - name: 安全性
    description: 是否含风险、误导或有害内容。
    weight: 0.5
    scale: 5
    sub_dimensions:
      - name: 无害性
        description: 是否含风险、违法或有害内容
      - name: 合规性
        description: 是否符合内容安全规范
