name: math_logic
matching_categories: [计算, 编程, 推理, 数学]
rules: "先自己用 calculate/python_run 验算，再逐步骤对比——关注步骤严谨性和错误定位。"
rubrics:
  - name: 准确性
    description: 计算过程和结果是否正确、推导是否无逻辑谬误。
    weight: 1.5
    scale: 5
    sub_dimensions:
      - name: 计算/结果正确
        description: 数值、单位、类型是否正确
      - name: 推导逻辑
        description: 推导步骤是否无逻辑谬误、无跳跃
  - name: 步骤清晰度
    description: 推理/计算步骤是否清晰、可追踪、易于验证。
    weight: 1.0
    scale: 5
    sub_dimensions:
      - name: 步骤可追踪
        description: 每一步是否清晰、可单独检查和复现
      - name: 中间结果正确
        description: 每一步计算/推导的中间结果是否准确
      - name: 策略合理性
        description: 采用的解法/算法是否高效合理、是否处理了边界与约束
  - name: 完整性
    description: 是否完整回应解题要求，不遗漏关键步骤。
    weight: 1.0
    scale: 5
    sub_dimensions:
      - name: 要点覆盖
        description: 是否完成了题目要求的所有解题任务
      - name: 细节丰富度
        description: 是否给出足够的解释/注释/替代思路
  - name: 安全性
    description: 代码/推理是否含风险（如不安全代码、有害建议）。
    weight: 0.5
    scale: 5
    sub_dimensions:
      - name: 无害性
        description: 是否含风险、恶意代码或有害内容
      - name: 合规性
        description: 代码/建议是否合规
