name: translation
matching_categories: [翻译]
rules: "评信达雅（忠实+通顺+美感），不过度纠结完整性的绝对面面俱到。"
rubrics:
  - name: 信达雅
    description: 翻译是否信（忠实原文）、达（通顺流畅）、雅（语言美感）。
    weight: 1.5
    scale: 5
    sub_dimensions:
      - name: 忠实度
        description: 是否准确传达了原文意思，无漏译/增译
      - name: 通顺度
        description: 译文是否自然流畅，无翻译腔
      - name: 语言美感
        description: 译文是否优雅、用地道表达
  - name: 准确性
    description: 专有名词、数字、术语是否准确。
    weight: 1.0
    scale: 5
    sub_dimensions:
      - name: 术语准确
        description: 专有名词/术语翻译是否规范
      - name: 数字/格式准确
        description: 数字、日期、格式是否正确转换
  - name: 完整性
    description: 是否完整翻译了原文的全部内容。
    weight: 1.0
    scale: 5
    sub_dimensions:
      - name: 无遗漏
        description: 是否有漏掉原文段落或句子
