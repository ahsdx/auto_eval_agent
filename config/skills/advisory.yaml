name: advisory
matching_categories: [建议, 规划, 开放-规划, 开放-建议, 方案]
rules: "重点评方案可行性、是否有具体可执行步骤——而非事实准确性。"
rubrics:
  - name: 可操作性
    description: 方案/建议是否具体可行、切实可执行。
    weight: 1.5
    scale: 5
    sub_dimensions:
      - name: 步骤可行性
        description: 给出的步骤是否具体、可落地
      - name: 资源合理
        description: 涉及的时间/预算/条件是否合理
  - name: 完整性
    description: 是否充分回应题目的所有要点，不遗漏。
    weight: 1.0
    scale: 5
    sub_dimensions:
      - name: 要点覆盖
        description: 覆盖了提问中的核心诉求点和子问题
      - name: 细节丰富度
        description: 是否给出足够的细节、备选方案
  - name: 准确性
    description: 方案中的事实信息是否正确（如地点、价格、政策）。
    weight: 0.5
    scale: 5
    sub_dimensions:
      - name: 事实准确性
        description: 陈述的事实/数据是否准确
  - name: 有用性
    description: 对提问者是否切实有用、满足需求。
    weight: 1.0
    scale: 5
    sub_dimensions:
      - name: 需求满足度
        description: 是否真正回应提问者需求
      - name: 清晰易懂
        description: 表达清晰、易读、不晦涩
