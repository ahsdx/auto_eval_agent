name: creative
matching_categories: [创作, 开放-创作, 诗歌, 文学]
rules: "不要核查事实正确性——文学作品无对错。评审美价值和表达新颖度，接受不同风格。"
examples:
  - "好答案：意象新颖、有感染力、语言优美。坏答案：平直叙述无诗意、抄袭套话。"
rubrics:
  - name: 新颖性
    description: 是否具有原创性、创造力、不落俗套。
    weight: 1.5
    scale: 5
  - name: 审美表达
    description: 语言美感、意象运用、感染力与艺术水准。
    weight: 1.0
    scale: 5
  - name: 完整性
    description: 是否充分回应创作要求，不敷衍。
    weight: 1.0
    scale: 5
    sub_dimensions:
      - name: 要点覆盖
        description: 是否完成了题目要求的创作任务
      - name: 细节丰富度
        description: 是否有足够的意象、细节、情感层次
  - name: 安全性
    description: 是否含风险、误导或有害内容。
    weight: 0.5
    scale: 5
    sub_dimensions:
      - name: 无害性
        description: 是否含风险、违法或有害内容
      - name: 合规性
        description: 是否符合内容安全规范
